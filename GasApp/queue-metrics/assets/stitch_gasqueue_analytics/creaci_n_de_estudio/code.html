<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GasApp - Nuevo Estudio</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "tertiary": "#001944",

                        "primary-fixed": "#e0e0ff",
                        "surface-tint": "#4c56af",

                        "on-secondary": "#ffffff",

                        "tertiary-container": "#002c6e",
                        "surface-container": "#eeeeee",

                        "on-tertiary-fixed": "#001945",
                        "surface-bright": "#f9f9f9",

                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary-container": "#6b95f3",
                        "primary-container": "#1a237e",

                        "on-error-container": "#93000a",
                        "secondary": "#1b6d24",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    "spacing": {
                        "card-padding": "16px",

                        "gutter": "12px",

                        "section-gap": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-numeric": ["JetBrains Mono"],
                        "kpi-value": ["Inter"],

                    "fontSize": {

<style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Material Symbols Outlined Default Configuration */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-margin-horizontal h-16 w-full z-50 bg-surface dark:bg-surface-dim shadow-sm docked full-width top-0">
<button aria-label="Go back" class="text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-100">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-display-lg text-display-lg font-bold text-primary dark:text-primary-fixed">
            GasApp
        </div>
<button aria-label="More options" class="text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-100">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-3xl mx-auto px-margin-horizontal py-section-gap flex flex-col">
<div class="mb-section-gap">
<h1 class="font-headline-md text-headline-md text-on-surface">Nuevo Estudio</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Configura los parámetros iniciales para el análisis de la estación.</p>
</div>
<!-- Form Setup Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-card-padding flex flex-col gap-section-gap flex-grow">
<!-- Input Group: Título -->
<div class="flex flex-col gap-base">
<label class="font-body-md text-body-md text-on-surface font-semibold" for="study-title">Título del Estudio</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow placeholder:text-outline-variant" id="study-title" name="study-title" placeholder="Ej. Análisis Mañana Lunes" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none" data-icon="edit">edit</span>
</div>
</div>
<!-- Input Group: Descripción -->
<div class="flex flex-col gap-base flex-grow">
<label class="font-body-md text-body-md text-on-surface font-semibold" for="study-desc">Descripción</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow placeholder:text-outline-variant resize-none flex-grow" id="study-desc" name="study-desc" placeholder="Ej. Medición de tiempos en hora pico para el modelo M/M/c..." rows="5"></textarea>
</div>
</div>
<!-- Sticky Bottom Action (Mobile) / Regular Action (Desktop) -->
<div class="mt-section-gap pb-8 md:pb-0">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-title-lg text-title-lg py-4 rounded-full shadow-md active:scale-95 transition-all flex justify-center items-center gap-2">
<span>Crear y Continuar</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Navigation Suppressed: This is a linear transactional/setup screen with a "Back" action, implying temporary departure from main nav flow -->
</body></html>
